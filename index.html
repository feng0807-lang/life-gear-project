<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GearAlive - 零成本联网版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        .gear-container { cursor: grab; user-select: none; }
        select { background: #000; border: 1px solid #00ff41; color: #00ff41; font-size: 10px; padding: 2px; }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-4">

    <div class="w-full max-w-sm border border-[#00ff41] p-3 bg-green-900/5">
        <div class="flex justify-between text-[10px] mb-2">
            <span>NODE_STATUS: <span id="status" class="text-red-500">[STAGNANT]</span></span>
            <span id="coords">LAT: -- | LON: --</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[9px] opacity-40">SECTOR:</span>
            <select id="state-selector">
                <option value="PENANG">PENANG</option>
                <option value="SELANGOR">SELANGOR</option>
                <option value="JOHOR">JOHOR</option>
                <option value="KUALA_LUMPUR">KUALA_LUMPUR</option>
            </select>
        </div>
    </div>

    <div class="text-center">
        <div id="counter" class="text-8xl font-black">0</div>
        <div class="text-[9px] tracking-widest opacity-40 mb-8 uppercase">Session_Contribution</div>
        <div id="gear" class="w-64 h-64 gear-container mx-auto">
            <svg viewBox="0 0 100 100" fill="none" stroke="#00ff41" stroke-width="2.5">
                <g id="gear-mesh">
                    <circle cx="50" cy="50" r="30" stroke-dasharray="2 2" />
                    <circle cx="50" cy="50" r="8" fill="#00ff41" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(0 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(45 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(90 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(135 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(180 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(225 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(270 50 50)" />
                    <path d="M46,5 L54,5 L52,15 L48,15 Z" fill="#00ff41" transform="rotate(315 50 50)" />
                </g>
            </svg>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4 mb-4">
        <div>
            <div class="text-[8px] opacity-40 mb-1">STATE_RANKING (LIVE)</div>
            <div id="state-list" class="text-xs border-l border-[#00ff41]/30 pl-2 space-y-1">加载中...</div>
        </div>
        <div>
            <div class="text-[8px] opacity-40 mb-1">NATIONAL_TOTAL</div>
            <div id="national-total" class="text-xl font-bold border-l border-white/30 pl-2">--</div>
        </div>
    </div>

    <script>
        // --- 请在此填入你的 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            databaseURL: "你的DATABASE_URL",
            projectId: "你的PROJECT_ID",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessionTurns = 0;
        let rotation = 0;
        let isDragging = false;
        let lastAngle = 0;
        let lastSyncTime = Date.now();

        // 核心：同步数据到 Firebase
        function syncData(increment) {
            const state = document.getElementById('state-selector').value;
            const ref = db.ref('stats/' + state);
            // 使用 transaction 确保高并发下数据准确
            ref.transaction((currentValue) => {
                return (currentValue || 0) + increment;
            });
        }

        // 监听云端数据变动并更新 UI
        db.ref('stats').on('value', (snapshot) => {
            const val = snapshot.val() || {};
            const sorted = Object.entries(val).sort((a, b) => b[1] - a[1]);
            
            // 州排行
            document.getElementById('state-list').innerHTML = sorted.map(([name, score], i) => `
                <div class="flex justify-between ${i===0?'text-white font-bold':''}">
                    <span>${i+1}. ${name}</span><span>${score.toLocaleString()}</span>
                </div>
            `).join('');

            // 国家总计
            const total = Object.values(val).reduce((a, b) => a + b, 0);
            document.getElementById('national-total').innerText = total.toLocaleString() + " TRNS";
        });

        // 交互逻辑 (与之前相同)
        const gear = document.getElementById('gear-mesh');
        const container = document.getElementById('gear');
        
        function getAngle(x, y) {
            const rect = container.getBoundingClientRect();
            return Math.atan2(y - (rect.top + rect.height/2), x - (rect.left + rect.width/2)) * 180 / Math.PI;
        }

        container.onmousedown = (e) => { isDragging = true; lastAngle = getAngle(e.clientX, e.clientY); };
        window.onmousemove = (e) => {
            if (!isDragging) return;
            const angle = getAngle(e.clientX, e.clientY);
            let delta = angle - lastAngle;
            if (delta > 180) delta -= 360;
            if (delta < -180) delta += 360;
            rotation += delta;
            gear.setAttribute('transform', `rotate(${rotation} 50 50)`);
            
            const newTurns = Math.floor(Math.abs(rotation) / 360);
            if (newTurns > sessionTurns) {
                const diff = newTurns - sessionTurns;
                sessionTurns = newTurns;
                document.getElementById('counter').innerText = sessionTurns;
                syncData(diff); // 每一圈都同步到云端
                if(window.navigator.vibrate) window.navigator.vibrate(10);
            }
            lastAngle = angle;
            document.getElementById('status').innerText = '[ACTIVE]';
            document.getElementById('status').className = 'text-green-500';
            lastSyncTime = Date.now();
        };
        window.onmouseup = () => isDragging = false;

        // GPS 检测
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('coords').innerText = `LAT: ${p.coords.latitude.toFixed(2)} | LON: ${p.coords.longitude.toFixed(2)}`;
            });
        }

        // 状态检测
        setInterval(() => {
            if (Date.now() - lastSyncTime > 2000) {
                document.getElementById('status').innerText = '[STAGNANT]';
                document.getElementById('status').className = 'text-red-500';
            }
        }, 1000);
    </script>
</body>
</html>
